        .svg-container {
            width: 90%;
            max-width: 450px;
            aspect-ratio: 1.618 / 1; /* ϕ */
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px 0;
            filter: drop-shadow(0 0 20px rgba(74,111,165,0.3));
        }

        svg {
            width: 100%;
            height: 100%;
        }

        .golden-rect {
            stroke: rgba(74, 111, 165, 0.5);
            stroke-width: 1.2;
            fill: none;
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: drawRects 3s ease-in-out forwards;
        }

        .golden-spiral {
            stroke: #ffd700;
            stroke-width: 3;
            fill: none;
            stroke-linecap: round;
            stroke-dasharray: 2000;
            stroke-dashoffset: 2000;
            animation: drawSpiral 3.69s cubic-bezier(0.5, 0, 0.5, 1) forwards;
            filter: drop-shadow(0 0 8px rgba(255, 215, 0, 0.7));
        }

        @keyframes drawRects {
            to { stroke-dashoffset: 0; }
        }

        @keyframes drawSpiral {
            0% { stroke-dashoffset: 2000; }
            15% { stroke-dashoffset: 2000; }
            100% { stroke-dashoffset: 0; }
        }

        .status {
            margin-top: 30px;
            letter-spacing: 5px;
            font-size: 0.8rem;
            color: #aaccff;
            text-transform: uppercase;
            animation: pulseStatus 2s infinite ease-in-out;
            text-shadow: 0 0 10px rgba(170,204,255,0.5);
        }

        @keyframes pulseStatus {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        .skip {
            margin-top: 20px;
            font-size: 0.7rem;
            color: rgba(170,204,255,0.3);
            cursor: pointer;
            transition: color 0.3s;
            text-decoration: none;
            border-bottom: 1px dotted transparent;
        }

        .skip:hover {
            color: #aaccff;
            border-bottom-color: #aaccff;
        }

        .footer {
            margin-top: 40px;
            font-size: 0.7rem;
            color: rgba(255,255,255,0.3);
            text-align: center;
        }

        @media (max-width: 600px) {

            .status { font-size: 0.7rem; letter-spacing: 3px; }
        }
